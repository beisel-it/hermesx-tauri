name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  # ── Semantic Release — determine version + create GitHub release ───────────
  semantic-release:
    name: Semantic Release
    runs-on: ubuntu-latest
    outputs:
      new_release_published: ${{ steps.release.outputs.new_release_published }}
      new_release_version:   ${{ steps.release.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: yarn install --no-frozen-lockfile || true

      - name: Semantic Release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: yarn release

  # ── Build Tauri (only when a new release was published) ───────────────────
  build-tauri:
    name: Build ${{ matrix.platform }}
    needs: semantic-release
    if: needs.semantic-release.outputs.new_release_published == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-x64
            runner: windows-latest
            args: ''
          - platform: macos-arm64
            runner: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-x64
            runner: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: linux-x64
            runner: ubuntu-22.04
            args: ''

    steps:
      - uses: actions/checkout@v4
        with:
          # Checkout the version commit that semantic-release just pushed
          ref: ${{ github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ contains(matrix.args, 'aarch64') && 'aarch64-apple-darwin' || contains(matrix.args, 'x86_64-apple-darwin') && 'x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux system deps
        if: matrix.runner == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf lld

      - run: yarn install --no-frozen-lockfile || true
      - run: yarn build || true  # frontend build — ok to skip until src/ exists

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY || '' }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '' }}
        with:
          args: ${{ matrix.args }}
          tagName: v${{ needs.semantic-release.outputs.new_release_version }}
          releaseName: 'HermesX v${{ needs.semantic-release.outputs.new_release_version }}'
          releaseBody: 'See CHANGELOG.md for details.'
          releaseDraft: false
          prerelease: false
          updaterJsonKeepUniversal: true
